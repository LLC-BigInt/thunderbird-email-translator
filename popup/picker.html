<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="picker.css" />
  </head>
  <body>
    <div class="mt-picker">
      <h1 class="mt-title">Translate message</h1>

      <label class="mt-row">
        <span class="mt-label">From</span>
        <select id="mt-from">
          <option value="auto">Auto-detect</option>
        </select>
      </label>

      <label class="mt-row">
        <span class="mt-label">To</span>
        <select id="mt-to"></select>
      </label>

      <div class="mt-actions">
        <button id="mt-translate" type="button">Translate</button>
      </div>

      <p id="mt-status" class="mt-status" role="status"></p>
    </div>

    <script type="module" src="picker.js"></script>
  </body>
</html>
